[site]
title = "Basilisk"
base_url = "/wiki"
mathjax_url = "https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"
edit_base_url = "https://github.com/gitit-testing-organization-123/wiki/edit/main"
table_of_contents = true

[paths]
wiki_root = "."
sandbox_root = "../sandbox"
source_root = "../basilisk/src"
output = "../public"
template_roots = ["templates"]
static_roots = ["static"]

[artifacts]
base_url = "https://basilisk.ric1.cdn.digitaloceanspaces.com"
source_local_root = "../basilisk/build/release/src"
sandbox_local_root = "../sandbox-artifacts"

[build]
source = true
source_tags = true
qcc_command = "qcc"
jobs = 4
verbose = true
