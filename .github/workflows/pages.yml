name: Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  repository_dispatch:
    types: [basilisk-artifacts-ready, sandbox-artifacts-ready]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout site content
        uses: actions/checkout@v4
        with:
          path: site

      - name: Checkout gititpy
        uses: actions/checkout@v4
        with:
          repository: gitit-testing-organization-123/gititpy
          path: gititpy

      - name: Checkout Basilisk
        uses: actions/checkout@v4
        with:
          repository: gitit-testing-organization-123/basilisk
          ref: ${{ github.event.action == 'basilisk-artifacts-ready' && github.event.client_payload.sha || 'relocatable-install' }}
          path: basilisk

      - name: Checkout sandbox
        if: github.event.action != 'sandbox-artifacts-ready'
        uses: actions/checkout@v4
        with:
          repository: gitit-testing-organization-123/sandbox
          path: sandbox

      - name: Checkout sandbox at artifact SHA
        if: github.event.action == 'sandbox-artifacts-ready'
        uses: actions/checkout@v4
        with:
          repository: gitit-testing-organization-123/sandbox
          ref: ${{ github.event.client_payload.sha }}
          path: sandbox

      - name: Restore generated site cache
        uses: actions/cache@v4
        with:
          path: public
          key: gititpy-public-${{ github.run_id }}
          restore-keys: |
            gititpy-public-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            gnuplot-nox \
            pandoc \
            python3-matplotlib \
            python3-numpy \
            s3cmd

      - name: Install gititpy
        run: |
          python -m pip install ./gititpy

      - name: Resolve artifact update scope
        id: artifact-scope
        if: github.event_name == 'repository_dispatch'
        run: |
          scope="${{ github.event.client_payload.artifact_scope }}"
          if [[ -z "${scope}" ]]; then
            case "${{ github.event.action }}" in
              basilisk-artifacts-ready) scope=source ;;
              sandbox-artifacts-ready) scope=sandbox ;;
            esac
          fi
          case "${scope}" in
            source|sandbox) ;;
            *)
              echo "::error::Unsupported artifact_scope '${scope}'. Expected source or sandbox."
              exit 1
              ;;
          esac
          echo "ARTIFACT_SCOPE=${scope}" >> "$GITHUB_ENV"
          echo "scope=${scope}" >> "$GITHUB_OUTPUT"

      - name: Download artifact tree
        if: github.event_name == 'repository_dispatch'
        env:
          ORG_ACTIONS_READ_TOKEN: ${{ secrets.ORG_ACTIONS_READ_TOKEN }}
          SOURCE_REPO: ${{ github.event.client_payload.source_repo }}
          RUN_ID: ${{ github.event.client_payload.run_id }}
          ARTIFACT_NAME: ${{ github.event.client_payload.artifact_name }}
        run: |
          set -euo pipefail
          case "${ARTIFACT_SCOPE}" in
            source)
              token="${ORG_ACTIONS_READ_TOKEN}"
              source_repo="${SOURCE_REPO:-gitit-testing-organization-123/basilisk}"
              artifact_name="${ARTIFACT_NAME:-basilisk-build-artifacts}"
              download_dir=basilisk/build/release/src
              ;;
            sandbox)
              token="${ORG_ACTIONS_READ_TOKEN}"
              source_repo="${SOURCE_REPO:-gitit-testing-organization-123/sandbox}"
              artifact_name="${ARTIFACT_NAME:-sandbox-build-artifacts}"
              download_dir=sandbox/build
              ;;
          esac
          if [[ -z "${token}" ]]; then
            echo "::error::An Actions read token is required to download ${ARTIFACT_SCOPE} artifacts."
            exit 1
          fi
          rm -rf "${download_dir}"
          mkdir -p "${download_dir}"
          GH_TOKEN="${token}" gh run download "${RUN_ID}" \
            --repo "${source_repo}" \
            --name "${artifact_name}" \
            --dir "${download_dir}"

      - name: Generate source plot artifacts
        if: github.event_name == 'repository_dispatch' && steps.artifact-scope.outputs.scope != 'sandbox'
        run: |
          python -m gititpy.artifacts_cli \
            --base-dir site \
            --scope source \
            plots generate

      - name: Generate sandbox plot artifacts
        if: github.event_name == 'repository_dispatch' && steps.artifact-scope.outputs.scope != 'source'
        run: |
          python -m gititpy.artifacts_cli \
            --base-dir site \
            --scope sandbox \
            plots generate

      - name: Stage source artifact tree
        if: github.event_name == 'repository_dispatch' && steps.artifact-scope.outputs.scope != 'sandbox'
        run: |
          rm -rf artifact-stage/src
          python -m gititpy.artifacts_cli \
            --base-dir site \
            --scope source \
            stage --dest artifact-stage

      - name: Stage sandbox artifact tree
        if: github.event_name == 'repository_dispatch' && steps.artifact-scope.outputs.scope != 'source'
        run: |
          rm -rf artifact-stage/sandbox
          python -m gititpy.artifacts_cli \
            --base-dir site \
            --scope sandbox \
            stage --dest artifact-stage

      - name: Upload artifacts to DigitalOcean Spaces
        if: github.event_name == 'repository_dispatch'
        env:
          DO_SPACES_KEY: ${{ secrets.DO_SPACES_KEY }}
          DO_SPACES_SECRET: ${{ secrets.DO_SPACES_SECRET }}
          DO_SPACES_BUCKET: basilisk
          DO_SPACES_REGION: ric1
        run: |
          set -euo pipefail
          if [[ -z "${DO_SPACES_KEY}" || -z "${DO_SPACES_SECRET}" ]]; then
            echo "::error::DO_SPACES_KEY and DO_SPACES_SECRET are required to upload artifacts."
            exit 1
          fi
          s3cmd sync artifact-stage/ "s3://${DO_SPACES_BUCKET}/" \
            --host="${DO_SPACES_REGION}.digitaloceanspaces.com" \
            --host-bucket="%(bucket)s.${DO_SPACES_REGION}.digitaloceanspaces.com" \
            --access_key="${DO_SPACES_KEY}" \
            --secret_key="${DO_SPACES_SECRET}" \
            --acl-public

      - name: Build site
        run: |
          python -m gititpy --base-dir site build
   
      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
